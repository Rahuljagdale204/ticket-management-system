spring:
  application:
    name: backend
    datasource:
      username: sa
      password: password
      driverClassName: org.h2.Driver
      url: jdbc:h2:mem:ticketing
      Hikari:
        minimumIdle: 20
        maximumPoolSize: 30
        connectionTimeout: 50000
    jpa:
      database-platform: org.hibernate.dialect.H2Dialect
      show-sql: true
      properties:
        hibernate:
          format_sql: true
    h2:
      console:
        enabled: true
        path: /h2-console

spring doc:
  api-docs:
    path: /api-docs

ai:
  gemini:
    api-key: ${GEMINI_API_KEY:}
    model: gemini-2.5-flash
    base-url: https://generativelanguage.googleapis.com/v1beta/models
    enabled: true
    timeout-seconds: 15